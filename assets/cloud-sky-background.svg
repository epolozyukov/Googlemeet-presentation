<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8faf8"/>
      <stop offset="0.42" stop-color="#e8f1f6"/>
      <stop offset="1" stop-color="#c9e2f4"/>
    </linearGradient>
    <radialGradient id="whiteCloud" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="0.58" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blueCloud" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#a7c9e4" stop-opacity="0.58"/>
      <stop offset="0.64" stop-color="#d4e7f2" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soften">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <g filter="url(#soften)">
    <ellipse cx="250" cy="190" rx="360" ry="120" fill="url(#whiteCloud)"/>
    <ellipse cx="610" cy="150" rx="460" ry="135" fill="url(#blueCloud)"/>
    <ellipse cx="1080" cy="210" rx="520" ry="150" fill="url(#whiteCloud)"/>
    <ellipse cx="1440" cy="310" rx="340" ry="130" fill="url(#blueCloud)"/>
    <ellipse cx="250" cy="690" rx="470" ry="170" fill="url(#whiteCloud)"/>
    <ellipse cx="680" cy="735" rx="560" ry="170" fill="url(#blueCloud)"/>
    <ellipse cx="1130" cy="720" rx="520" ry="190" fill="url(#whiteCloud)"/>
    <ellipse cx="1500" cy="675" rx="420" ry="170" fill="url(#whiteCloud)"/>
    <ellipse cx="900" cy="460" rx="720" ry="150" fill="#ffffff" opacity="0.32"/>
    <ellipse cx="1200" cy="520" rx="540" ry="140" fill="#bdd9ec" opacity="0.3"/>
  </g>
</svg>
